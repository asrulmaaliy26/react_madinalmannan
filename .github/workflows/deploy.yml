name: 🚀 Auto Deploy - madin.staialmannan.ac.id

on:
  push:
    branches:
      - main
  workflow_dispatch: # Bisa trigger manual dari GitHub UI

jobs:
  deploy:
    name: 🌐 Deploy ke madin.staialmannan.ac.id
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode terbaru
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # 4. Build project (GEMINI_API_KEY dari GitHub Secrets)
      - name: 🏗️ Build Project
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 5. Upload hasil build ke VPS via SCP
      #    public/.htaccess ikut terbuild masuk ke dist/
      #    dist/* → /home/staialmannan/madin.staialmannan.ac.id/
      - name: 📤 Upload dist/ ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.MADIN_SECRET_KEY_SSH }}
          port: 22
          source: "dist/*"
          target: "/home/staialmannan/madin.staialmannan.ac.id"
          strip_components: 1

      # 6. Graceful reload Apache agar file baru langsung aktif
      - name: ♻️ Reload Apache di VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.MADIN_SECRET_KEY_SSH }}
          port: 22
          script: |
            echo "✅ File berhasil diupload ke /home/staialmannan/madin.staialmannan.ac.id"
            echo "♻️ Graceful reload Apache..."
            /usr/local/apps/apache2/bin/apachectl graceful
            echo "🎉 https://madin.staialmannan.ac.id sudah terupdate!"

      - name: ✅ Deploy Berhasil
        if: success()
        run: |
          echo "🎉 Deploy berhasil!"
          echo "🌐 Cek: https://madin.staialmannan.ac.id"

      - name: ❌ Deploy Gagal
        if: failure()
        run: echo "💥 Deploy gagal! Cek log di atas."
